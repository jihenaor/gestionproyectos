spring:
  application:
    name: gestionproyectos-backend
  # Sin variable: perfil local (H2). IBM i: SOLO as400 — no combine local+as400 (ver EntornoStartupLogger en log).
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.gestionproyectos: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:gestion-proyectos-secret-key-2026-ccf-security}
      expiration: ${APP_SECURITY_JWT_EXPIRATION:57600}
  # Si true, las respuestas 500 incluyen exception + detail (útil para depurar). En producción use false o APP_ERROR_EXPOSE_DETAILS.
  error:
    expose-details: ${APP_ERROR_EXPOSE_DETAILS:false}

ccf:
  storage:
    base-path: ${STORAGE_PATH:/tmp/gestionproyectos}
    max-file-size: 52428800
  drive:
    enabled: ${GOOGLE_DRIVE_ENABLED:false}
    credentials-path: ${GOOGLE_CREDENTIALS_PATH:}
    folder-id: ${GOOGLE_DRIVE_FOLDER_ID:}

google:
  drive:
    folder-id: ${GOOGLE_DRIVE_FOLDER_ID:}
    service-account-key-path: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_KEY:classpath:drive-service-account-key.json}
    application-name: GestionProyectos-Backend
    share-with-domain: ${GOOGLE_DRIVE_SHARE_WITH_DOMAIN:}
    share-with-group-email: ${GOOGLE_DRIVE_SHARE_WITH_GROUP:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
