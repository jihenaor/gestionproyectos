services:
  # ── Backend Spring Boot ────────────────────────────────────────────────────────
  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-final}
    ports:
      # Puerto externo 8087 (8080=servicio-core, 8086=procesos-judiciales ocupados).
      # Acceso directo: http://HOST:8087/api/...
      - "8087:8080"
    networks:
      - cief-net
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      # Perfil local (H2): no necesita variables DB. Perfil as400: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS.
      - DB_HOST=${DB_HOST:-10.25.2.212}
      - DB_PORT=${DB_PORT:-446}
      - DB_NAME=${DB_NAME:-CCFPROY}
      - DB_USER=${DB_USER:-CCFPROY}
      - DB_PASS=${DB_PASS:-CCFPROY2026}
      - APP_SECURITY_JWT_SECRET=${APP_SECURITY_JWT_SECRET:-gestion-proyectos-secret-key-2026-ccf-security}
      - APP_SECURITY_JWT_EXPIRATION=${APP_SECURITY_JWT_EXPIRATION:-57600}
      - GOOGLE_DRIVE_ENABLED=${GOOGLE_DRIVE_ENABLED:-false}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID:-}
      - GOOGLE_CREDENTIALS_PATH=${GOOGLE_CREDENTIALS_PATH:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend Angular ───────────────────────────────────────────────────────────
  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        ENV: prod
        BASE_HREF: /gestionproyectos/
        DEPLOY_URL: /gestionproyectos/
    ports:
      # Puerto externo 4203 (4200=frontend-central, 4202=pjudiciales ocupados).
      # Acceso: http://HOST:4203/gestionproyectos/
      - "4203:80"
    networks:
      - cief-net
    depends_on:
      - backend

networks:
  cief-net:
    external: true