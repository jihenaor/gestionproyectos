server {
    listen 80;
    server_name _;

    # Angular build output — /gestionproyectos/ es el base-href del build.
    root /usr/share/nginx/html/gestionproyectos;
    index index.html;

    # Logs
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json;

    # Cache estático aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html: sin caché (Angular lo maneja con hashes en los bundles)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA routing: todas las rutas → index.html
    location /gestionproyectos/ {
        try_files $uri $uri/ /gestionproyectos/index.html;
    }

    # Health check
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}