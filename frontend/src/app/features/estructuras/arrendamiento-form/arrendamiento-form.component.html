<div class="estructura-form">
  <header class="estructura-form__header">
    <h2 class="estructura-form__title">P-026A: Arrendamiento de Bienes Inmuebles</h2>
    <p class="estructura-form__description">
      Diligencie la información del contrato de arrendamiento de bienes inmuebles.
    </p>
  </header>

  <form class="estructura-form__form">
    <div class="form-row">
      <app-form-field
        label="Número de Contrato"
        fieldId="numContrato"
        [isRequired]="true"
        description="Número del contrato de arrendamiento">
        <input
          type="text"
          id="numContrato"
          class="form-input"
          [(ngModel)]="datos.numContrato"
          name="numContrato"
          maxlength="50" />
      </app-form-field>

      <app-form-field
        label="Fecha de Contrato"
        fieldId="fechaContrato"
        [isRequired]="true"
        description="Formato: AAAAMMDD"
        formatExample="20241231">
        <input
          type="text"
          id="fechaContrato"
          class="form-input"
          [(ngModel)]="datos.fechaContrato"
          name="fechaContrato"
          maxlength="8"
          placeholder="AAAAMMDD" />
      </app-form-field>
    </div>

    <app-form-field
      label="Bien Arrendado"
      fieldId="bienArrendado"
      [isRequired]="true"
      description="Descripción del bien inmueble arrendado">
      <input
        type="text"
        id="bienArrendado"
        class="form-input"
        [(ngModel)]="datos.bienArrendado"
        name="bienArrendado"
        maxlength="200" />
    </app-form-field>

    <div class="form-row">
      <app-form-field
        label="Valor Canon"
        fieldId="valorCanon"
        [isRequired]="true"
        description="Valor del canon de arrendamiento">
        <input
          type="number"
          id="valorCanon"
          class="form-input"
          [(ngModel)]="datos.valorCanon"
          name="valorCanon"
          min="0" />
      </app-form-field>

      <app-form-field
        label="Plazo (Meses)"
        fieldId="plazoMeses"
        [isRequired]="true"
        description="Plazo del contrato en meses">
        <input
          type="number"
          id="plazoMeses"
          class="form-input"
          [(ngModel)]="datos.plazoMeses"
          name="plazoMeses"
          min="0" />
      </app-form-field>
    </div>

    <app-form-field
      label="Fecha Cert. Tradición y Libertad"
      fieldId="fechaCertTradicionLibertad"
      [isRequired]="true"
      description="Formato: AAAAMMDD"
      formatExample="20241231">
      <input
        type="text"
        id="fechaCertTradicionLibertad"
        class="form-input"
        [(ngModel)]="datos.fechaCertTradicionLibertad"
        name="fechaCertTradicionLibertad"
        maxlength="8"
        placeholder="AAAAMMDD" />
    </app-form-field>
  </form>

  <div class="estructura-form__actions">
    <app-button variant="secondary" type="button" (click)="cancelar()">Cancelar</app-button>
    <app-button variant="primary" type="button" (click)="guardar()" [loading]="guardando()">
      Guardar P-026A
    </app-button>
  </div>
</div>
