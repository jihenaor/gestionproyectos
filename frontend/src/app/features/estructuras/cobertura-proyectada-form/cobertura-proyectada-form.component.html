<div class="estructura-form">
  <header class="estructura-form__header">
    <h2 class="estructura-form__title">P-011A: Cobertura Proyectada</h2>
    <p class="estructura-form__description">
      Diligencie la información de cobertura proyectada del proyecto.
    </p>
  </header>

  <form class="estructura-form__form">
    <div class="form-row">
      <app-form-field
        label="Tipo de Beneficiario"
        fieldId="tipoBeneficiario"
        [isRequired]="true"
        tableReference="Tipos de Beneficiario">
        <select
          id="tipoBeneficiario"
          class="form-select"
          [(ngModel)]="datos.tipoBeneficiario"
          name="tipoBeneficiario">
          <option value="">Seleccione...</option>
          @for (opt of tipoBeneficiarioOptions; track opt.codigo) {
            <option [value]="opt.codigo">{{ opt.nombre }}</option>
          }
        </select>
      </app-form-field>

      <app-form-field
        label="Número de Beneficiarios"
        fieldId="numeroBeneficiarios"
        [isRequired]="true"
        description="Cantidad projected de beneficiarios">
        <input
          type="number"
          id="numeroBeneficiarios"
          class="form-input"
          [(ngModel)]="datos.numeroBeneficiarios"
          name="numeroBeneficiarios"
          min="0" />
      </app-form-field>
    </div>

    <div class="form-row">
      <app-form-field
        label="Departamento"
        fieldId="departamento"
        [isRequired]="true"
        tableReference="División Política Colombia">
        <select
          id="departamento"
          class="form-select"
          [(ngModel)]="datos.departamento"
          name="departamento">
          <option value="">Seleccione...</option>
          @for (dept of departamentos; track dept.codigo) {
            <option [value]="dept.codigo">{{ dept.nombre }}</option>
          }
        </select>
      </app-form-field>

      <app-form-field
        label="Municipio"
        fieldId="municipio"
        [isRequired]="true"
        description="Nombre del municipio">
        <input
          type="text"
          id="municipio"
          class="form-input"
          [(ngModel)]="datos.municipio"
          name="municipio"
          maxlength="100" />
      </app-form-field>
    </div>
  </form>

  <div class="estructura-form__actions">
    <app-button variant="secondary" type="button" (click)="cancelar()">Cancelar</app-button>
    <app-button variant="primary" type="button" (click)="guardar()" [loading]="guardando()">
      Guardar P-011A
    </app-button>
  </div>
</div>
